<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nokia 105 Test</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    button {
      font-size: 16px;
      padding: 10px 14px;
      margin: 8px 0;
    }
    .box {
      border: 1px solid #999;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Nokia 105 Test</h1>

  <p>This page tests:</p>
  <ol>
    <li>Basic JavaScript</li>
    <li>Geolocation</li>
  </ol>

  <div class="box" id="js-result">
    JavaScript test not run yet.
  </div>

  <button type="button" onclick="runJsTest()">Run JavaScript Test</button>

  <div class="box" id="geo-result">
    Geolocation not requested yet.
  </div>

  <button type="button" onclick="getLocation()">Get My Location</button>

  <script>
    function runJsTest() {
      var now = new Date();
      document.getElementById('js-result').innerHTML =
        'JavaScript works.<br>' +
        'Current time from JS: ' + now.toString();
    }

    function getLocation() {
      var out = document.getElementById('geo-result');

      if (!navigator.geolocation) {
        out.innerHTML = 'Geolocation API is not supported on this browser/phone.';
        return;
      }

      out.innerHTML = 'Trying to get location...';

      navigator.geolocation.getCurrentPosition(
        function (position) {
          out.innerHTML =
            'Latitude: ' + position.coords.latitude + '<br>' +
            'Longitude: ' + position.coords.longitude + '<br>' +
            'Accuracy: ' + position.coords.accuracy + ' meters';
        },
        function (error) {
          var msg = 'Unknown error';
          if (error.code === 1) msg = 'Permission denied';
          if (error.code === 2) msg = 'Position unavailable';
          if (error.code === 3) msg = 'Request timed out';

          out.innerHTML = 'Failed to get location: ' + msg;
        },
        {
          enableHighAccuracy: false,
          timeout: 10000,
          maximumAge: 60000
        }
      );
    }
  </script>
</body>
</html>
